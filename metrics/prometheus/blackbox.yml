# blackbox.yml - Blackbox Exporter Configuration
modules:
  http_2xx:
    prober: http
    timeout: 10s
    http:
      valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
      valid_status_codes: []  # Default: 2xx
      method: GET
      headers:
        Accept-Encoding: gzip
        User-Agent: "Prometheus Blackbox Exporter"
      fail_if_ssl: false
      fail_if_not_ssl: false
      tls_config:
        insecure_skip_verify: false
      preferred_ip_protocol: ip4
      ip_protocol_fallback: true

  http_post_2xx:
    prober: http
    timeout: 10s
    http:
      method: POST
      headers:
        Content-Type: application/json
      body: '{}'
      valid_status_codes: [200, 201]

  tcp_connect:
    prober: tcp
    timeout: 10s
    tcp:
      preferred_ip_protocol: ip4

  dns_check:
    prober: dns
    timeout: 10s
    dns:
      preferred_ip_protocol: ip4
      query_name: "yourdomain.com"
      query_type: "A"
      valid_rcodes:
        - NOERROR

  icmp_ping:
    prober: icmp
    timeout: 10s
    icmp:
      preferred_ip_protocol: ip4
      dont_fragment: false
