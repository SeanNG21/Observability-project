# ============================================================
# alertmanager.yml - Production Configuration
# ============================================================
global:
  resolve_timeout: 5m
  smtp_smarthost: "smtp.yourdomain.com:587"
  smtp_from: "alertmanager@yourdomain.com"
  smtp_auth_username: "alertmanager@yourdomain.com"
  smtp_auth_password: "smtp_password_here"
  smtp_require_tls: true

templates:
  - "/etc/alertmanager/templates/*.tmpl"

# ============================================================
# ROUTING
# ============================================================
route:
  group_by: ["alertname", "cluster", "service", "env"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: "default-email"

  routes:
    - match:
        severity: critical
      receiver: "critical-receiver"
      group_wait: 10s
      group_interval: 1m
      repeat_interval: 30m
      continue: false

    - match:
        severity: warning
      receiver: "warning-email"
      group_wait: 1m
      group_interval: 10m
      repeat_interval: 2h
      continue: false

    - match:
        team: dba
      receiver: "dba-team"
      routes:
        - match:
            severity: critical
          receiver: "dba-critical"

# ============================================================
# INHIBIT RULES
# ============================================================
inhibit_rules:
  - source_match:
      alertname: "HostDown"
    target_match_re:
      alertname: ".*"
    equal: ["hostname"]

  - source_match:
      severity: "critical"
    target_match:
      severity: "warning"
    equal: ["alertname", "service", "hostname"]

  - source_match:
      alertname: "ServiceDown"
    target_match:
      alertname: "APIHighResponseTime"
    equal: ["service"]

# ============================================================
# RECEIVERS
# ============================================================
receivers:

  - name: "default-email"
    email_configs:
      - to: "ops-team@yourdomain.com"
        send_resolved: true
        html: '{{ template "email.default.html" . }}'
        headers:
          Subject: '[{{ .Status | toUpper }}] {{ .CommonAnnotations.summary }}'

  - name: "critical-receiver"
    telegram_configs:
      - bot_token: "YOUR_TELEGRAM_BOT_TOKEN"
        chat_id: -1001234567890
        message: '{{ template "telegram.critical.message" . }}'
        parse_mode: "HTML"
        send_resolved: true
    email_configs:
      - to: "ops-critical@yourdomain.com"
        send_resolved: true
        html: '{{ template "email.critical.html" . }}'
        headers:
          Subject: '[CRITICAL] {{ .CommonAnnotations.summary }}'

  - name: "warning-email"
    email_configs:
      - to: "ops-team@yourdomain.com"
        send_resolved: true
        html: '{{ template "email.default.html" . }}'
        headers:
          Subject: '[WARNING] {{ .CommonAnnotations.summary }}'

  - name: "dba-team"
    email_configs:
      - to: "dba-team@yourdomain.com"
        send_resolved: true
        headers:
          Subject: '[DB ALERT] {{ .CommonAnnotations.summary }}'

  - name: "dba-critical"
    telegram_configs:
      - bot_token: "YOUR_TELEGRAM_BOT_TOKEN"
        chat_id: -1009876543210
        message: '{{ template "telegram.critical.message" . }}'
        parse_mode: "HTML"
        send_resolved: true
    email_configs:
      - to: "dba-team@yourdomain.com"
        send_resolved: true
        headers:
          Subject: '[DB CRITICAL] {{ .CommonAnnotations.summary }}'

  - name: "infra-team"
    email_configs:
      - to: "infra-team@yourdomain.com"
        send_resolved: true
        headers:
          Subject: '[INFRA] {{ .CommonAnnotations.summary }}'
