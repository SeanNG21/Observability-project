# ============================================================
# nginx.conf - Observability-Ready Nginx Configuration
# JSON access log format with trace_id support
# ============================================================

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ============================================================
    # JSON Log Format - parseable by Filebeat/Logstash
    # Includes trace_id and request_id for correlation
    # ============================================================
    log_format json_combined escape=json
    '{'
        '"@timestamp":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"x_forwarded_for":"$http_x_forwarded_for",'
        '"request_method":"$request_method",'
        '"request_uri":"$request_uri",'
        '"server_protocol":"$server_protocol",'
        '"status":$status,'
        '"body_bytes_sent":$body_bytes_sent,'
        '"request_time":$request_time,'
        '"upstream_response_time":"$upstream_response_time",'
        '"upstream_connect_time":"$upstream_connect_time",'
        '"upstream_header_time":"$upstream_header_time",'
        '"upstream_addr":"$upstream_addr",'
        '"http_user_agent":"$http_user_agent",'
        '"http_referer":"$http_referer",'
        '"http_x_trace_id":"$http_x_trace_id",'
        '"http_x_request_id":"$request_id",'
        '"server_name":"$server_name",'
        '"host":"$host",'
        '"gzip_ratio":"$gzip_ratio"'
    '}';

    access_log /var/log/nginx/access.log json_combined;
    error_log /var/log/nginx/error.log warn;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    # Request ID generation
    map $http_x_request_id $request_id_use {
        default $http_x_request_id;
        ""      $request_id;
    }

    # ============================================================
    # Upstream - Portal Service
    # ============================================================
    upstream portal_backend {
        least_conn;
        server portal-server-01:8080 max_fails=3 fail_timeout=30s;
        server portal-server-02:8080 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # Upstream - API Service
    upstream api_backend {
        least_conn;
        server api-server-01:8081 max_fails=3 fail_timeout=30s;
        server api-server-02:8081 max_fails=3 fail_timeout=30s;
        keepalive 64;
    }

    # ============================================================
    # Rate limiting
    # ============================================================
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/m;
    limit_req_zone $binary_remote_addr zone=general:10m rate=60r/m;

    # ============================================================
    # Status endpoint for nginx-exporter
    # ============================================================
    server {
        listen 8080;
        server_name _;
        location /stub_status {
            stub_status;
            allow 127.0.0.1;
            allow 172.0.0.0/8;  # Docker networks
            deny all;
        }
        access_log off;
    }

    # ============================================================
    # Portal Service
    # ============================================================
    server {
        listen 80;
        listen 443 ssl http2;
        server_name portal.yourdomain.com;

        ssl_certificate /etc/ssl/certs/portal.crt;
        ssl_certificate_key /etc/ssl/private/portal.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512;

        # Propagate request_id and trace headers
        proxy_set_header X-Request-ID $request_id_use;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;

        # Preserve OpenTelemetry trace headers
        proxy_set_header traceparent $http_traceparent;
        proxy_set_header tracestate $http_tracestate;
        proxy_set_header baggage $http_baggage;

        location / {
            proxy_pass http://portal_backend;
            proxy_connect_timeout 10s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            # Add trace_id to response for debugging
            add_header X-Trace-ID $upstream_http_x_trace_id always;
            add_header X-Request-ID $request_id_use always;
        }

        location /health {
            proxy_pass http://portal_backend/health;
            access_log off;
        }
    }

    # ============================================================
    # API Service
    # ============================================================
    server {
        listen 80;
        listen 443 ssl http2;
        server_name api.yourdomain.com;

        ssl_certificate /etc/ssl/certs/api.crt;
        ssl_certificate_key /etc/ssl/private/api.key;
        ssl_protocols TLSv1.2 TLSv1.3;

        proxy_set_header X-Request-ID $request_id_use;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header traceparent $http_traceparent;
        proxy_set_header tracestate $http_tracestate;
        proxy_set_header baggage $http_baggage;

        location /api/ {
            limit_req zone=api_limit burst=200 nodelay;
            proxy_pass http://api_backend;
            proxy_connect_timeout 5s;
            proxy_read_timeout 30s;
            add_header X-Trace-ID $upstream_http_x_trace_id always;
            add_header X-Request-ID $request_id_use always;
        }

        location /metrics {
            deny all;
        }

        location /health {
            proxy_pass http://api_backend/health;
            access_log off;
        }
    }

    # ============================================================
    # Monitoring UIs - Internal only
    # ============================================================
    server {
        listen 80;
        server_name monitoring.yourdomain.com;

        # Allow only internal IPs
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;

        # Grafana
        location /grafana/ {
            proxy_pass http://grafana:3000/;
            proxy_set_header Host $host;
        }

        # Kibana
        location /kibana/ {
            proxy_pass http://kibana:5601/;
            proxy_set_header Host $host;
        }

        # Prometheus
        location /prometheus/ {
            auth_basic "Prometheus";
            auth_basic_user_file /etc/nginx/.htpasswd;
            proxy_pass http://prometheus:9090/;
        }

        # Alertmanager
        location /alertmanager/ {
            auth_basic "Alertmanager";
            auth_basic_user_file /etc/nginx/.htpasswd;
            proxy_pass http://alertmanager:9093/;
        }
    }
}
