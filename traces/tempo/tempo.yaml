# ============================================================
# tempo.yaml - Grafana Tempo 2.4.x Configuration
# ============================================================
server:
  http_listen_port: 3200
  log_level: info

# Distributor - nhận spans từ OTel Collector / app
distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

# Ingester - buffer trước khi ghi xuống storage
ingester:
  max_block_duration: 5m
  max_block_bytes: 1073741824   # 1GB
  trace_idle_period: 10s
  flush_check_period: 10s
  lifecycler:
    ring:
      kvstore:
        store: inmemory
      replication_factor: 1

# Compactor - quản lý vòng đời block
compactor:
  compaction:
    compaction_window: 1h
    block_retention: 336h        # 14 ngày
    compacted_block_retention: 1h

# Storage - dùng local disk
storage:
  trace:
    backend: local
    local:
      path: /tmp/tempo/blocks
    wal:
      path: /tmp/tempo/wal
    pool:
      max_workers: 100
      queue_depth: 10000

# Query frontend
query_frontend:
  search:
    duration_slo: 5s
    throughput_bytes_slo: 1073741824
  trace_by_id:
    duration_slo: 5s

# Querier
querier:
  max_concurrent_queries: 20

# Metrics generator - sinh RED metrics từ traces
# "processors" nằm trong overrides.defaults, KHÔNG đặt trực tiếp trong metrics_generator
metrics_generator:
  registry:
    external_labels:
      source: tempo
      cluster: production
  storage:
    path: /tmp/tempo/generator/wal
    remote_write:
      - url: http://prometheus:9090/api/v1/write
        send_exemplars: true
  # processor config (không phải list processors ở đây)
  processor:
    service_graphs:
      dimensions:
        - http.method
        - http.status_code
    span_metrics:
      dimensions:
        - http.method
        - http.status_code
        - http.route

# Global overrides - processors được bật ở đây
overrides:
  defaults:
    metrics_generator:
      processors:
        - service-graphs
        - span-metrics
    ingestion:
      rate_limit_bytes: 15000000
      burst_size_bytes: 20000000
      max_traces_per_user: 10000
    global:
      max_bytes_per_trace: 5000000
