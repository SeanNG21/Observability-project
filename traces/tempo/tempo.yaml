# ============================================================
# tempo.yaml - Grafana Tempo Configuration
# Distributed tracing backend
# ============================================================
server:
  http_listen_port: 3200
  grpc_listen_port: 9096
  log_level: info

# Distributor receives spans from OTel Collector
distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318
    jaeger:
      protocols:
        thrift_http:
          endpoint: 0.0.0.0:14268
        grpc:
          endpoint: 0.0.0.0:14250

# Ingester buffers spans before writing
ingester:
  max_block_duration: 5m
  max_block_bytes: 1_073_741_824  # 1GB
  trace_idle_period: 10s
  flush_check_period: 10s
  lifecycler:
    ring:
      kvstore:
        store: inmemory
      replication_factor: 1

# Compactor manages block lifecycle
compactor:
  compaction:
    compaction_window: 1h
    max_block_bytes: 107_374_182_400  # 100GB
    block_retention: 336h             # 14 days
    compacted_block_retention: 1h

# Storage backend
storage:
  trace:
    backend: local
    local:
      path: /tmp/tempo/blocks
    wal:
      path: /tmp/tempo/wal
    pool:
      max_workers: 100
      queue_depth: 10000

# Query frontend
query_frontend:
  search:
    duration_slo: 5s
    throughput_bytes_slo: 1.073741824e+09
  trace_by_id:
    duration_slo: 5s
  max_retries: 3

# Querier
querier:
  frontend_worker:
    frontend_address: "localhost:9096"
    grpc_client_config:
      grpc_compression: gzip
  max_concurrent_queries: 20

# Metrics generator - generates RED metrics from traces
metrics_generator:
  registry:
    external_labels:
      source: tempo
      cluster: production
  storage:
    path: /tmp/tempo/generator/wal
    remote_write:
      - url: http://prometheus:9090/api/v1/write
        send_exemplars: true
  processors:
    - service-graphs
    - span-metrics

# Global overrides
overrides:
  defaults:
    metrics_generator:
      processors: [service-graphs, span-metrics]
    ingestion:
      rate_limit_bytes: 15_000_000   # 15MB/s per tenant
      burst_size_bytes: 20_000_000   # 20MB burst
      max_traces_per_user: 10000
    global:
      max_bytes_per_trace: 5_000_000  # 5MB max per trace
