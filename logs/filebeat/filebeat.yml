# ============================================================
# filebeat.yml - Production Log Collection
# Collects: Docker container logs, nginx, syslog, app logs
# ============================================================

# strict.perms: false bắt buộc trên WSL/Windows
# vì file mount từ NTFS không giữ được Linux ownership
filebeat.registry:
  path: /usr/share/filebeat/data/registry

# ============================================================
# INPUTS
# ============================================================
filebeat.inputs:

  # Docker container logs - tất cả containers
  - type: container
    id: docker-containers
    enabled: true
    paths:
      - /var/lib/docker/containers/*/*.log
    stream: all
    processors:
      - add_docker_metadata:
          host: "unix:///var/run/docker.sock"
    fields:
      log_type: "docker"
      env: "production"
    fields_under_root: true

  # Nginx Access Log
  - type: filestream
    id: nginx-access
    enabled: true
    paths:
      - /var/log/nginx/access.log
      - /var/log/nginx/*-access.log
    fields:
      log_type: "nginx_access"
      service: "nginx"
      env: "production"
    fields_under_root: true

  # Nginx Error Log
  - type: filestream
    id: nginx-error
    enabled: true
    paths:
      - /var/log/nginx/error.log
    fields:
      log_type: "nginx_error"
      service: "nginx"
      env: "production"
    fields_under_root: true

  # System Syslog
  - type: filestream
    id: syslog
    enabled: true
    paths:
      - /var/log/syslog
      - /var/log/messages
    fields:
      log_type: "syslog"
      service: "system"
      env: "production"
    fields_under_root: true

  # Auth Log
  - type: filestream
    id: auth-log
    enabled: true
    paths:
      - /var/log/auth.log
      - /var/log/secure
    fields:
      log_type: "auth"
      service: "system"
      env: "production"
    fields_under_root: true

# ============================================================
# PROCESSORS - thêm metadata vào mọi event
# ============================================================
processors:
  - add_host_metadata:
      when.not.contains.tags: forwarded
  - add_fields:
      target: ""
      fields:
        cluster: "production"

# ============================================================
# OUTPUT → Logstash
# ============================================================
output.logstash:
  hosts:
    - "${LOGSTASH_HOST:logstash:5044}"
  bulk_max_size: 2048
  timeout: 15
  worker: 2
  compression_level: 3

# ============================================================
# LOGGING
# ============================================================
logging.level: warning
logging.to_stderr: true

# ============================================================
# HTTP endpoint để monitor filebeat
# ============================================================
http.enabled: true
http.port: 5066
