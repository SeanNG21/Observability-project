# ============================================================
# logstash-pipeline.conf
# Main Logstash Pipeline - Parse, Enrich, Index logs
# ============================================================

input {
  # Receive from Filebeat
  beats {
    port => 5044
    host => "0.0.0.0"
  }

  # TCP Syslog input
  tcp {
    port => 5000
    type => "syslog"
    codec => json_lines
  }
}

# ============================================================
# FILTER - Parse and enrich all log types
# ============================================================
filter {

  # Add common fields
  mutate {
    add_field => {
      "[@metadata][index_prefix]" => "logs"
      "ingested_at" => "%{@timestamp}"
    }
  }

  # ==========================================================
  # APPLICATION LOGS (JSON format expected)
  # ==========================================================
  if [log_type] == "application" {

    # If message is JSON string, parse it
    if [message] =~ /^\{/ {
      json {
        source => "message"
        target => "app"
        skip_on_invalid_json => true
      }
      # Promote key fields to top level
      mutate {
        rename => {
          "[app][timestamp]"     => "log_timestamp"
          "[app][level]"         => "log_level"
          "[app][service]"       => "service_name"
          "[app][trace_id]"      => "trace_id"
          "[app][span_id]"       => "span_id"
          "[app][request_id]"    => "request_id"
          "[app][user_id]"       => "user_id"
          "[app][method]"        => "http_method"
          "[app][path]"          => "http_path"
          "[app][status_code]"   => "http_status_code"
          "[app][response_time]" => "response_time_ms"
          "[app][error_code]"    => "error_code"
          "[app][error_message]" => "error_message"
          "[app][client_ip]"     => "client_ip"
          "[app][message]"       => "log_message"
        }
        uppercase => ["log_level"]
      }
    }

    # Set index
    mutate {
      add_field => { "[@metadata][index_prefix]" => "logs-app" }
    }

    # Parse log_level to numeric for easy filtering
    if [log_level] == "ERROR" or [log_level] == "FATAL" {
      mutate { add_field => { "log_level_num" => 50 } }
      mutate { add_tag => ["error"] }
    } else if [log_level] == "WARN" or [log_level] == "WARNING" {
      mutate { add_field => { "log_level_num" => 40 } }
    } else if [log_level] == "INFO" {
      mutate { add_field => { "log_level_num" => 30 } }
    } else if [log_level] == "DEBUG" {
      mutate { add_field => { "log_level_num" => 20 } }
    }

    # Convert response_time to float
    if [response_time_ms] {
      mutate {
        convert => { "response_time_ms" => "float" }
      }
    }

    # Convert http_status_code to integer
    if [http_status_code] {
      mutate {
        convert => { "http_status_code" => "integer" }
      }
      if [http_status_code] >= 500 {
        mutate { add_tag => ["5xx", "server_error"] }
      } else if [http_status_code] >= 400 {
        mutate { add_tag => ["4xx", "client_error"] }
      }
    }
  }

  # ==========================================================
  # NGINX ACCESS LOG
  # ==========================================================
  if [log_type] == "nginx_access" {

    grok {
      match => {
        "message" => [
          # JSON nginx log format (recommended)
          '%{GREEDYDATA:nginx_json}',
          # Classic format fallback
          '%{IPORHOST:client_ip} - %{DATA:remote_user} \[%{HTTPDATE:nginx_timestamp}\] "%{WORD:http_method} %{DATA:http_path} HTTP/%{NUMBER:http_version}" %{NUMBER:http_status_code} %{NUMBER:bytes_sent} "%{DATA:http_referer}" "%{DATA:user_agent}" "%{DATA:x_forwarded_for}" rt=%{NUMBER:response_time} uct="%{DATA:upstream_connect_time}" uht="%{DATA:upstream_header_time}" urt="%{DATA:upstream_response_time}"'
        ]
      }
    }

    # Parse JSON nginx log if applicable
    if [nginx_json] =~ /^\{/ {
      json {
        source => "nginx_json"
        target => "nginx"
        skip_on_invalid_json => true
      }
      mutate {
        rename => {
          "[nginx][remote_addr]"          => "client_ip"
          "[nginx][request_method]"       => "http_method"
          "[nginx][request_uri]"          => "http_path"
          "[nginx][status]"               => "http_status_code"
          "[nginx][body_bytes_sent]"      => "bytes_sent"
          "[nginx][request_time]"         => "response_time"
          "[nginx][upstream_response_time]" => "upstream_response_time"
          "[nginx][http_user_agent]"      => "user_agent"
          "[nginx][http_x_forwarded_for]" => "x_forwarded_for"
          "[nginx][http_x_trace_id]"      => "trace_id"
          "[nginx][http_x_request_id]"    => "request_id"
          "[nginx][server_name]"          => "vhost"
        }
      }
    }

    # Convert fields
    mutate {
      convert => {
        "http_status_code"      => "integer"
        "bytes_sent"            => "integer"
        "response_time"         => "float"
        "upstream_response_time" => "float"
      }
    }

    # GeoIP enrichment
    if [client_ip] and [client_ip] !~ /^(10\.|172\.(1[6-9]|2[0-9]|3[01])\.|192\.168\.|127\.)/ {
      geoip {
        source => "client_ip"
        target => "geoip"
        fields => ["city_name", "country_name", "country_code2", "location"]
      }
    }

    # Tag error responses
    if [http_status_code] >= 500 {
      mutate { add_tag => ["5xx", "server_error"] }
    } else if [http_status_code] >= 400 {
      mutate { add_tag => ["4xx"] }
    }

    mutate {
      add_field => { "[@metadata][index_prefix]" => "logs-nginx" }
    }
  }

  # ==========================================================
  # NGINX ERROR LOG
  # ==========================================================
  if [log_type] == "nginx_error" {
    grok {
      match => {
        "message" => '%{DATA:nginx_date} \[%{DATA:log_level}\] %{DATA:pid}#%{DATA:tid}: \*%{NUMBER:connection_id} %{GREEDYDATA:error_message}'
      }
    }
    mutate {
      add_field => { "[@metadata][index_prefix]" => "logs-nginx" }
      add_tag => ["nginx_error"]
    }
  }

  # ==========================================================
  # MYSQL SLOW QUERY LOG
  # ==========================================================
  if [log_type] == "mysql_slow" {
    grok {
      match => {
        "message" => [
          "# Time: %{DATA:query_time_str}\n# User@Host: %{USER:db_user}\[%{USER}\] @ %{IPORHOST:db_host} \[%{IP:db_ip}\]\n# Query_time: %{NUMBER:query_time:float}\s+Lock_time: %{NUMBER:lock_time:float}\s+Rows_sent: %{NUMBER:rows_sent:int}\s+Rows_examined: %{NUMBER:rows_examined:int}\n(?:SET timestamp=%{NUMBER};\n)?%{GREEDYDATA:sql_query}"
        ]
      }
    }
    mutate {
      add_field => { "[@metadata][index_prefix]" => "logs-db" }
      add_tag => ["slow_query"]
    }
    # Flag very slow queries (>5s)
    if [query_time] and [query_time] > 5 {
      mutate { add_tag => ["very_slow_query"] }
    }
  }

  # ==========================================================
  # COMMON ENRICHMENT FOR ALL LOGS
  # ==========================================================

  # Add hostname if missing
  if ![hostname] and [host][name] {
    mutate { rename => { "[host][name]" => "hostname" } }
  }

  # Parse timestamp
  if [log_timestamp] {
    date {
      match => ["log_timestamp", "ISO8601", "yyyy-MM-dd HH:mm:ss.SSS", "yyyy-MM-dd'T'HH:mm:ss.SSSZ"]
      target => "@timestamp"
      timezone => "Asia/Ho_Chi_Minh"
    }
  }

  # Remove noise fields
  mutate {
    remove_field => ["agent", "ecs", "input", "log", "nginx_json", "app", "nginx"]
  }
}

# ============================================================
# OUTPUT - Send to Elasticsearch
# ============================================================
output {

  # All logs to Elasticsearch
  elasticsearch {
    hosts => ["${ELASTICSEARCH_HOSTS:http://elasticsearch:9200}"]
    user => "elastic"
    password => "${ELASTIC_PASSWORD:ElasticPass123!}"

    # Dynamic index based on log type and date
    index => "%{[@metadata][index_prefix]}-%{env}-%{+YYYY.MM.dd}"

    # ILM Policy
    ilm_enabled => true
    ilm_rollover_alias => "%{[@metadata][index_prefix]}-%{env}"
    ilm_pattern => "{now/d}-000001"
    ilm_policy => "logs-ilm-policy"

    # Template
    template_name => "logs-template"
    template_overwrite => false

    # Performance tuning
    workers => 4
    bulk_max_size => 2048
    flush_size => 500
  }

  # Debug output (disable in production)
  # stdout { codec => rubydebug }
}
